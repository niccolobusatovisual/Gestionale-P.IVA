<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gestionale P.IVA — Niccolò Busato</title>
<meta name="theme-color" content="#f2f2f7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gestionale">
<style>
/* ============ DESIGN TOKENS — Apple-like ============ */
:root{
  --bg:#f2f2f7; --card:#ffffff; --ink:#1c1c1e; --muted:#8e8e93; --line:rgba(60,60,67,.12);
  --accent:#ff6b1a; --accent-2:#ff9500;
  --accent-soft:rgba(255,107,26,.12);
  --ok:#34c759; --ok-soft:rgba(52,199,89,.15);
  --blu:#007aff; --blu-soft:rgba(0,122,255,.12);
  --danger:#ff3b30; --danger-soft:rgba(255,59,48,.12);
  --warn:#cc7a00; --warn-soft:rgba(255,149,0,.16);
  --grigio:#8e8e93; --grigio-soft:rgba(120,120,128,.14);
  --kb:rgba(120,120,128,.09);
  --input:rgba(120,120,128,.10);
  --btn:rgba(120,120,128,.13);
  --glass:rgba(242,242,247,.82);
  --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 28px rgba(0,0,0,.06);
  --shadow-sm:0 1px 2px rgba(0,0,0,.05),0 3px 10px rgba(0,0,0,.05);
  --r-xl:22px; --r-lg:18px; --r-md:14px;
}
[data-theme=dark]{
  --bg:#000000; --card:#1c1c1e; --ink:#f2f2f7; --muted:#98989e; --line:rgba(84,84,88,.5);
  --accent:#ff7a26; --accent-soft:rgba(255,122,38,.20);
  --ok:#30d158; --ok-soft:rgba(48,209,88,.20);
  --blu:#0a84ff; --blu-soft:rgba(10,132,255,.20);
  --danger:#ff453a; --danger-soft:rgba(255,69,58,.20);
  --warn:#ffb340; --warn-soft:rgba(255,159,10,.20);
  --grigio:#98989e; --grigio-soft:rgba(120,120,128,.24);
  --kb:rgba(120,120,128,.14);
  --input:rgba(120,120,128,.22);
  --btn:rgba(120,120,128,.26);
  --glass:rgba(10,10,12,.8);
  --shadow:0 1px 2px rgba(0,0,0,.35),0 10px 30px rgba(0,0,0,.35);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3),0 3px 10px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{color-scheme:light dark}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;
  transition:background .25s,color .25s;
}
button{font:inherit;cursor:pointer;color:inherit}
input,select,textarea{font:inherit;color:inherit}

/* ============ HEADER (glass) ============ */
header{
  position:sticky;top:0;z-index:50;
  background:var(--glass);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--line);
}
.topbar{max-width:1240px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:14px}
.brand{font-weight:800;font-size:17px;letter-spacing:-.03em;white-space:nowrap}
.brand small{color:var(--muted);font-weight:500;letter-spacing:0}
.seg{display:flex;background:var(--btn);border-radius:99px;padding:3px;gap:2px;margin:0 auto}
.seg button{
  border:none;background:none;border-radius:99px;padding:7px 16px;
  font-weight:600;font-size:13.5px;color:var(--muted);white-space:nowrap;
  transition:color .15s;
}
.seg button.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}
.top-actions{display:flex;gap:8px;margin-left:auto}
.iconbtn{
  width:36px;height:36px;border-radius:50%;border:none;background:var(--btn);
  display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink);
}
.iconbtn:active{transform:scale(.94)}
.iconbtn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}

/* ============ TAB BAR (mobile) ============ */
#tabbar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:60;
  background:var(--glass);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  border-top:.5px solid var(--line);
  padding:6px 8px calc(6px + env(safe-area-inset-bottom));
}
#tabbar .row{display:flex;max-width:520px;margin:0 auto}
#tabbar button{
  flex:1;border:none;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:4px 0;color:var(--muted);font-size:10px;font-weight:600;border-radius:12px;
}
#tabbar button.active{color:var(--accent)}
#tabbar svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ============ LAYOUT ============ */
main{max-width:1240px;margin:0 auto;padding:20px 16px 60px}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:30px 0 14px;flex-wrap:wrap}
.sec-head:first-child{margin-top:4px}
.sec-head h2{font-size:22px;font-weight:800;letter-spacing:-.03em}
.sec-head .sub{color:var(--muted);font-size:13px;font-weight:500}

/* ============ BUTTONS ============ */
.btn{
  border:none;background:var(--btn);color:var(--accent);
  border-radius:99px;padding:9px 16px;font-weight:600;font-size:14px;
  transition:transform .1s,opacity .15s;
}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--accent);color:#fff}
.btn.mini{padding:6px 12px;font-size:12.5px}
.btn.danger{color:var(--danger);background:var(--danger-soft)}
.btn.neutro{color:var(--ink)}

/* ============ DASHBOARD ============ */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(215px,1fr));gap:14px}
.stat{background:var(--card);border-radius:var(--r-xl);padding:18px 18px 16px;box-shadow:var(--shadow-sm)}
.stat .lbl{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat .big{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-top:8px;font-variant-numeric:tabular-nums}
.stat .det{font-size:13px;color:var(--muted);margin-top:5px;font-weight:500}
.stat.acc{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);box-shadow:0 10px 30px rgba(255,199,120,.35)}
[data-theme=dark] .stat.acc{box-shadow:0 10px 30px rgba(255,107,26,.25)}
.stat.acc .lbl,.stat.acc .det{color:rgba(255,255,255,.85)}
.stat.acc .big{color:#fff}
.taxbox{background:var(--card);border-radius:var(--r-xl);padding:20px;margin-top:16px;box-shadow:var(--shadow-sm)}
.taxbox h3{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
.taxbox p{color:var(--muted);font-size:14px;margin-bottom:6px}
.taxbox p b{color:var(--ink)}
.taxrow{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0 4px}
.taxpill{background:var(--input);border-radius:14px;padding:10px 14px;font-size:12.5px;color:var(--muted);font-weight:500}
.taxpill b{display:block;font-size:16px;color:var(--ink);font-weight:700;letter-spacing:-.02em;margin-top:1px}
.avviso{background:var(--warn-soft);color:var(--warn);border-radius:14px;padding:12px 15px;font-size:13.5px;margin-top:12px;font-weight:500}

/* ============ BADGE & CHIP ============ */
.badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:600;white-space:nowrap}
.badge.g{background:var(--grigio-soft);color:var(--grigio)}
.badge.b{background:var(--blu-soft);color:var(--blu)}
.badge.v{background:var(--ok-soft);color:var(--ok)}
.badge.r{background:var(--danger-soft);color:var(--danger)}
.badge.a{background:var(--warn-soft);color:var(--warn)}
.chip{display:inline-block;background:var(--grigio-soft);color:var(--muted);border-radius:7px;padding:2px 8px;font-size:11px;font-weight:500;margin:3px 4px 0 0}

/* ============ KANBAN ============ */
.kb{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 10px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch}
.kb-col{
  background:var(--kb);border-radius:var(--r-lg);padding:10px;
  min-width:250px;flex:1 0 250px;scroll-snap-align:start;transition:background .15s;
}
.kb-col.over{outline:2px dashed var(--accent);outline-offset:-2px;background:var(--accent-soft)}
.kb-head{display:flex;align-items:center;justify-content:space-between;margin:2px 4px 10px;padding:0 2px}
.kb-count{font-size:12px;color:var(--muted);font-weight:700;background:var(--grigio-soft);border-radius:99px;padding:1px 8px}
.kb-cards{display:flex;flex-direction:column;gap:9px;min-height:44px}
.kb-empty{color:var(--muted);opacity:.5;text-align:center;font-size:12.5px;padding:12px 0;font-weight:500}
.kcard{background:var(--card);border-radius:16px;padding:13px 14px;cursor:grab;box-shadow:var(--shadow-sm)}
.kcard.dragging{opacity:.45;transform:rotate(1.5deg)}
.kcard-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.kcard .num{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:7px;padding:2px 8px;letter-spacing:.02em}
.kcard-val{font-weight:800;font-size:15px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.kcard-title{font-weight:600;font-size:14.5px;margin-top:7px;line-height:1.3;letter-spacing:-.01em}
.kcard-sub{font-size:12.5px;color:var(--muted);margin-top:2px;font-weight:500}
.kcard-date{font-size:12px;color:var(--muted);margin-top:5px;font-weight:500}
.kcard-date.rossa{color:var(--danger);font-weight:600}
.kcard-actions{display:flex;align-items:center;gap:7px;margin-top:11px;flex-wrap:wrap}
.spacer{flex:1}
.mover{display:flex;gap:5px}
.mv{
  width:27px;height:27px;border-radius:50%;border:none;background:var(--btn);
  color:var(--ink);font-size:15px;font-weight:700;line-height:1;
  display:flex;align-items:center;justify-content:center;padding-bottom:2px;
}
.mv:disabled{opacity:.3;cursor:default}
.mv:not(:disabled):active{transform:scale(.9)}
.icon{background:none;border:none;color:var(--muted);font-size:14px;padding:4px 6px;border-radius:8px}
.icon:active{background:var(--grigio-soft)}
.linkino{font-size:12px;color:var(--ok);font-weight:600}
.warn-bollo{font-size:11.5px;color:var(--warn);font-weight:600}

/* ============ TABELLE ============ */
.twrap{background:var(--card);border-radius:var(--r-xl);overflow-x:auto;box-shadow:var(--shadow-sm);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:780px}
th{padding:12px 14px;text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:.5px solid var(--line);white-space:nowrap;font-weight:600}
td{padding:11px 14px;border-bottom:.5px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.scaduta td{background:var(--danger-soft)}
td.euro{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.vuoto{padding:30px;text-align:center;color:var(--muted);font-weight:500}

/* ============ CLIENTI ============ */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.ccard{
  background:var(--card);border-radius:var(--r-xl);padding:17px;cursor:pointer;
  box-shadow:var(--shadow-sm);transition:transform .12s;
}
.ccard:active{transform:scale(.98)}
.ccard .avatar{
  width:44px;height:44px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;margin-bottom:10px;
}
.ccard h3{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:2px}
.ccard .meta{font-size:12.5px;color:var(--muted);font-weight:500}
.ccard .conta{display:flex;gap:12px;margin-top:12px;font-size:12px;color:var(--muted);font-weight:500}
.ccard .conta b{color:var(--ink);font-weight:700}
.dettaglio-info{background:var(--card);border-radius:var(--r-xl);padding:22px;margin-bottom:6px;box-shadow:var(--shadow-sm)}
.dettaglio-info .avatar{
  width:58px;height:58px;border-radius:50%;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;margin-bottom:12px;
}
.dettaglio-info h2{font-size:23px;font-weight:800;letter-spacing:-.03em;margin-bottom:5px}
.dettaglio-info .riga{font-size:14px;color:var(--muted);margin-top:4px;font-weight:500}
.dettaglio-info .riga b{color:var(--ink);font-weight:600}
.dettaglio-azioni{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.mini-list{display:flex;flex-direction:column;gap:9px}
.mini-item{
  background:var(--card);border-radius:16px;padding:12px 15px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow-sm);
}
.mini-item .tt{font-weight:600;flex:1;min-width:130px;font-size:14px}
.mini-item .euro{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.mini-item .num{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:7px;padding:2px 8px}

/* ============ MODAL / SHEET ============ */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:100;overflow-y:auto}
#modal.open{display:flex;align-items:flex-start;justify-content:center;padding:18px}
.modal-box{
  background:var(--card);border-radius:var(--r-xl);max-width:580px;width:100%;
  padding:24px;margin:5vh 0 40px;box-shadow:var(--shadow);
  animation:pop .22s cubic-bezier(.3,1.4,.6,1);
}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.handle{display:none;width:38px;height:5px;border-radius:99px;background:var(--grigio-soft);margin:0 auto 14px}
.modal-box h3{font-size:19px;font-weight:800;letter-spacing:-.02em;margin-bottom:18px}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.frm .full{grid-column:1/-1}
.frm label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.01em}
.frm input[type=text],.frm input[type=email],.frm input[type=tel],.frm input[type=url],
.frm input[type=number],.frm input[type=date],.frm select,.frm textarea{
  width:100%;border:none;border-radius:13px;padding:11px 13px;
  background:var(--input);color:var(--ink);appearance:none;-webkit-appearance:none;
}
.frm select{background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 18px) 55%,calc(100% - 13px) 55%;background-size:5px 5px;background-repeat:no-repeat}
.frm input:focus,.frm select:focus,.frm textarea:focus{outline:none;box-shadow:0 0 0 2.5px var(--accent)}
.frm textarea{resize:vertical;min-height:70px}
.frm input[type=date]{min-height:41px}
.chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}
.chk{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:500 !important;color:var(--ink) !important;padding:4px 0;cursor:pointer}
.chk input{width:17px;height:17px;accent-color:var(--accent)}
.frm-foot{grid-column:1/-1;display:flex;justify-content:flex-end;gap:9px;margin-top:8px}
.hint-acc{grid-column:1/-1;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-soft);border-radius:13px;padding:10px 13px}
.hint-bollo{grid-column:1/-1;display:none;font-size:12.5px;color:var(--warn);background:var(--warn-soft);border-radius:13px;padding:10px 13px;font-weight:500}
.nota-campo{font-size:11px;color:var(--muted);font-weight:400;margin-top:3px}

/* ============ TOAST / BANNER ============ */
#toast{
  position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--bg);border-radius:99px;padding:11px 20px;
  font-size:14px;font-weight:600;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  box-shadow:var(--shadow);white-space:nowrap;
}
#toast.show{opacity:1}
.banner-mem{background:var(--warn-soft);color:var(--warn);text-align:center;font-size:13px;padding:7px 12px;font-weight:500}

/* ============ RESPONSIVE ============ */
@media (max-width:768px){
  .seg{display:none}
  #tabbar{display:block}
  main{padding:16px 12px calc(100px + env(safe-area-inset-bottom))}
  .sec-head h2{font-size:20px}
  .stat .big{font-size:24px}
  .kb-col{min-width:76vw;flex:0 0 76vw}
  #modal.open{padding:0;align-items:flex-end}
  .modal-box{margin:0;max-width:none;border-radius:var(--r-xl) var(--r-xl) 0 0;max-height:93vh;overflow-y:auto;padding:16px 18px calc(22px + env(safe-area-inset-bottom));animation:sheet .3s cubic-bezier(.32,.72,.28,1)}
  .handle{display:block}
  @keyframes sheet{from{transform:translateY(60%)}to{transform:none}}
  .frm{grid-template-columns:1fr}
  table{font-size:13px}
}
@media (max-width:400px){
  .brand small{display:none}
}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand">NB <small>· Gestionale P.IVA</small></div>
    <div class="seg" id="segnav"></div>
    <div class="top-actions">
      <button class="iconbtn" id="btnTheme" title="Tema chiaro/scuro">◐</button>
      <button class="iconbtn" id="btnExport" title="Esporta backup JSON"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5"/><path d="M4 19h16"/></svg></button>
      <button class="iconbtn" id="btnImport" title="Importa backup JSON"><svg viewBox="0 0 24 24"><path d="M12 15V3M7 8l5-5 5 5"/><path d="M4 19h16"/></svg></button>
    </div>
  </div>
  <div class="banner-mem" id="bannerMem" style="display:none">⚠ localStorage non disponibile: i dati vivono solo in questa sessione. Usa Esporta per non perderli.</div>
</header>

<main id="app"></main>

<div id="tabbar"><div class="row" id="tabrow"></div></div>
<div id="modal"></div>
<div id="toast"></div>
<input type="file" id="importFile" accept=".json,application/json" hidden>

<script>
'use strict';
/* ============================================================
   GESTIONALE P.IVA — Niccolò Busato · regime forfettario
   Singolo file HTML · dati in localStorage · backup JSON · PWA
   ============================================================ */

const LS_KEY = 'gestionale_piva_nb_v1';
const THEME_KEY = 'gestionale_piva_nb_theme';
const ZONE = ['Zanè','Vicenza','Brescia','Milano','Altro'];
const TIPI_ATTIVITA = ['Ristorante','Bar','Pizzeria','Hotel/B&B','Palestra','Studio professionale','Artigiano/Edile','Negozio','Altro'];
const SERVIZI = ['Graphic Design','Brand Identity','Web Design','Sito web','Automazioni AI','Consulenza','Content Creation','Foto/Video'];
const STATI_PREVENTIVO = ['Bozza','Inviato','Accettato','Rifiutato','Scaduto'];
const STATI_PROGETTO = ['Non iniziato','In corso','Fatto'];
const STATI_FATTURA = ['Da emettere','Emessa','Pagata','Scaduta'];
const TIPI_DOC = ['Fattura','Nota di credito','Prestazione occasionale'];
const METODI_PAG = ['Bonifico','PayPal','Contanti','Altro'];
const ALIQUOTA_ACC = 0.2322;      // ~23% di ogni incasso da accantonare
const SOGLIA_BOLLO = 77.47;

const STATO_CLASSE = {
  'Bozza':'g','Inviato':'b','Accettato':'v','Rifiutato':'r','Scaduto':'a',
  'Non iniziato':'g','In corso':'b','Fatto':'v',
  'Da emettere':'g','Emessa':'b','Pagata':'v','Scaduta':'r'
};

const VIEWS = [
  {id:'dashboard', label:'Dashboard'},
  {id:'clienti',   label:'Clienti'},
  {id:'preventivi',label:'Preventivi'},
  {id:'progetti',  label:'Progetti'},
  {id:'fatture',   label:'Fatture'}
];
const ICONS = {

/* ---------- helper ---------- */
const $ = s => document.querySelector(s);
function uid(){ return 'x' + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function eur(n){ return (n==null || n==='' || isNaN(n)) ? '—' : new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(n); }
function arrot(x){ return Math.round(x*100)/100; }
function oggi(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtData(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3 ? p[2]+'/'+p[1]+'/'+p[0] : d; }
function somma(arr, fn){ return arr.reduce((s,x)=>s+(parseFloat(fn(x))||0), 0); }
function badge(st){ return '<span class="badge '+(STATO_CLASSE[st]||'g')+'">'+esc(st)+'</span>'; }
function chips(arr){ if(!arr||!arr.length) return ''; return '<div>'+arr.map(s=>'<span class="chip">'+esc(s)+'</span>').join('')+'</div>'; }
function iniziali(nome){ return (nome||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),2400); }

/* ---------- persistenza (localStorage con fallback in memoria) ---------- */
let lsOk = true;
try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); } catch(e){ lsOk=false; }

function caricaDB(){
  if(!lsOk) return null;
  try { const raw = localStorage.getItem(LS_KEY); return raw ? JSON.parse(raw) : null; } catch(e){ return null; }
}
function salva(){
  if(lsOk){ try { localStorage.setItem(LS_KEY, JSON.stringify(db)); } catch(e){} }
}

/* ---------- tema ---------- */
function applicaTema(t){
  document.documentElement.dataset.theme = t;
  const m = document.querySelector('meta[name=theme-color]');
  if(m) m.content = t==='dark' ? '#000000' : '#f2f2f7';
}

try {

         (typeof matchMedia==='function' && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
} catch(e){}
applicaTema(tema);

/* ---------- frecce sposta-stato (touch friendly) ---------- */
function frecce(entity, statiArr, stato, id){
  const i = statiArr.indexOf(stato);
  return `<span class="mover">
    <button class="mv" ${i<=0?'disabled':''} onclick="muovi('${entity}','${id}',-1)" aria-label="Sposta indietro">‹</button>
    <button class="mv" ${i>=statiArr.length-1?'disabled':''} onclick="muovi('${entity}','${id}',1)" aria-label="Sposta avanti">›</button>
  </span>`;
}
window.muovi = function(entity, id, dir){
  const cfg = {
    preventivo:{arr:db.preventivi, stati:STATI_PREVENTIVO, campo:'stato'},
    progetto:{arr:db.progetti, stati:STATI_PROGETTO, campo:'stato'},
    fattura:{arr:db.fatture, stati:STATI_FATTURA, campo:'statoPagamento'}
  }[entity];
  if(!cfg) return;
  const r = cfg.arr.find(x=>x.id===id); if(!r) return;
  const i = cfg.stati.indexOf(r[cfg.campo]) + dir;
  if(i<0 || i>=cfg.stati.length) return;
  spostaStato(entity, id, cfg.stati[i]);
};

function scadenzarioHTML(soloAperte){
  let list = [...db.fatture];
  if(soloAperte) list = list.filter(f=>f.statoPagamento!=='Pagata');
  list.sort((a,b)=>{
    const x=a.scadenzaPagamento||'9999-12-31', y=b.scadenzaPagamento||'9999-12-31';
    return x<y?-1:x>y?1:0;
  });
  if(!list.length) return soloAperte ? '' : '<div class="twrap"><div class="vuoto">Nessuna fattura.</div></div>';

/* ---------- kanban + drag & drop (desktop) ---------- */
function kanban(entity, stati, records, campo, cardFn){
  return '<div class="kb">' + stati.map(st=>{
    const recs = records.filter(r=>r[campo]===st);
    return `<div class="kb-col" data-entity="${entity}" data-stato="${esc(st)}">
      <div class="kb-head">${badge(st)}<span class="kb-count">${recs.length}</span></div>
      <div class="kb-cards">${recs.map(cardFn).join('') || '<div class="kb-empty">sposta qui</div>'}</div>
    </div>`;
  }).join('') + '</div>';
}
function bindDnD(root){
  root.querySelectorAll('.kcard[draggable=true]').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', JSON.stringify({id:el.dataset.id, entity:el.dataset.entity}));
      e.dataTransfer.effectAllowed='move';
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', ()=>el.classList.remove('dragging'));
  });
  root.querySelectorAll('.kb-col').forEach(col=>{
    col.addEventListener('dragover', e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; col.classList.add('over'); });
    col.addEventListener('dragleave', ()=>col.classList.remove('over'));
    col.addEventListener('drop', e=>{
      e.preventDefault(); col.classList.remove('over');
      let data; try{ data=JSON.parse(e.dataTransfer.getData('text/plain')); }catch(_){ return; }
      if(!data || data.entity!==col.dataset.entity) return;
      spostaStato(data.entity, data.id, col.dataset.stato);
    });
  });
}
function spostaStato(entity, id, stato){
  if(entity==='preventivo'){ const r=db.preventivi.find(x=>x.id===id); if(r) r.stato=stato; }
  else if(entity==='progetto'){ const r=db.progetti.find(x=>x.id===id); if(r) r.stato=stato; }
  else if(entity==='fattura'){
    const r=db.fatture.find(x=>x.id===id);
    if(r){ r.statoPagamento=stato; if(stato==='Pagata' && !r.dataIncasso) r.dataIncasso=oggi(); }
  }
  salva(); render();
}
window.spostaStato = spostaStato;

  if(hintB) hintB.style.display = (tot > SOGLIA_BOLLO && !form.elements.bollo.checked) ? 'block' : 'none';

/* ---------- export / import ---------- */
$('#btnExport').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(db,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gestionale-piva-backup-'+oggi()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 500);
  toast('Backup esportato');
});
$('#btnImport').addEventListener('click', ()=>$('#importFile').click());
$('#importFile').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const d = JSON.parse(r.result);
      if(!Array.isArray(d.clienti)||!Array.isArray(d.preventivi)||!Array.isArray(d.progetti)||!Array.isArray(d.fatture)) throw new Error('struttura');
      if(!confirm('Importare il backup? I dati attuali verranno sostituiti.')) return;
      db = d; db.counters = db.counters || {pr:0,ft:0};
      salva(); render(); toast('Backup importato');
    }catch(_){ alert('File non valido: deve essere un backup JSON di questo gestionale.'); }
  };
  r.readAsText(file);
  e.target.value='';
});
